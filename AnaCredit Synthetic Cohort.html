<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnaCredit · BiL Demo</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="collateral/collateral.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-2); overflow: hidden; }
  #root { height: 100%; }
  .view-toggle { padding: 7px 18px; border-radius: 999; border: none; cursor: pointer; font-family: var(--font-sans); font-size: 12px; font-weight: 600; transition: background 0.14s ease, color 0.14s ease; }
  .view-toggle.active { background: #fff; color: var(--fg-1); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .view-toggle:not(.active) { background: transparent; color: var(--fg-muted); }
  .ts-arrow {
    width: 46px; height: 46px; border-radius: 999px; border: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; font-size: 19px;
    font-family: var(--font-sans); transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
  }
  .ts-arrow:hover:not(:disabled) { transform: scale(1.08); }
  .ts-arrow:disabled { opacity: 0.3; cursor: default; }
  .ts-rail-item { cursor: pointer; transition: background 0.14s ease, border-color 0.14s ease; }
  .ch-tile { cursor: pointer; transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease; }
  .ch-tile:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(15,23,42,0.14); border-color: var(--k-spruce-40); }
  .ch-tile:hover .ch-cta { background: var(--k-spruce-60); color: #fff; }
  .modal-btn { padding: "7px 13px"; }
  .ch-modal-scrim { animation: chFade 0.18s ease; }
  @keyframes chFade { from { opacity: 0; } to { opacity: 1; } }
  .ch-modal-card { animation: chPop 0.2s cubic-bezier(0.2,0.7,0.3,1); }
  @keyframes chPop { from { opacity: 0; transform: translateY(10px) scale(0.99); } to { opacity: 1; transform: none; } }
  @keyframes chDot { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="collateral/sheet-parts.jsx"></script>
<script type="text/babel" src="collateral/personas.jsx"></script>
<script type="text/babel" src="bil-os/persona-orb.jsx"></script>
<script type="text/babel" src="bil-os/talk.jsx"></script>
<script type="text/babel" src="bil-os/shell.jsx"></script>
<script type="text/babel" src="bil-os/portal.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

/* scale a fixed-size node to fit an available box */
function ScaledStage({ w, h, pad = 0, children }) {
  const ref = useRef(null);
  const [scale, setScale] = useState(0);
  useEffect(() => {
    const el = ref.current;
    const fit = () => {
      const r = el.getBoundingClientRect();
      setScale(Math.min((r.width - pad) / w, (r.height - pad) / h));
    };
    fit();
    const ro = new ResizeObserver(fit);
    ro.observe(el);
    return () => ro.disconnect();
  }, [w, h]);
  return (
    <div ref={ref} style={{ flex: 1, minHeight: 0, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
      {scale > 0 ? (
        <div style={{ width: w * scale, height: h * scale, flex: "0 0 auto" }}>
          <div style={{ width: w, height: h, transform: `scale(${scale})`, transformOrigin: "top left", borderRadius: 10, overflow: "hidden", boxShadow: "0 30px 80px rgba(0,0,0,0.45)", background: "#fff" }}>
            {children}
          </div>
        </div>
      ) : null}
    </div>
  );
}

function CohortTile({ p, onOpen }) {
  const loud = (p.context.find((c) => c[0] === "Loudest in") || [])[1] || "";
  return (
    <div className="ch-tile" onClick={onOpen} style={{
      background: "#fff", border: "1px solid var(--border-1)", borderRadius: 12,
      padding: "18px 18px 15px", display: "flex", flexDirection: "column", gap: 11,
      minWidth: 0, boxShadow: "0 1px 3px rgba(15,23,42,0.05)",
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 13 }}>
        {p.photo ? (
          <img src={p.photo} alt={p.name} style={{ width: 60, height: 60, borderRadius: 11, flex: "0 0 auto", objectFit: "cover", display: "block" }} />
        ) : (
          <span style={{ width: 60, height: 60, borderRadius: 11, flex: "0 0 auto", background: "linear-gradient(135deg, #29707A, #5BA2AE)", color: "#fff", display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 20 }}>{p.initials}</span>
        )}
        <span style={{ minWidth: 0 }}>
          <span style={{ display: "block", fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 16.5, color: "var(--fg-1)", lineHeight: 1.12 }}>{p.name}</span>
          <span style={{ display: "block", fontSize: 11.5, color: "var(--fg-muted)", marginTop: 2 }}>{p.role}</span>
        </span>
      </div>
      <div style={{ fontFamily: "var(--font-display)", fontStyle: "italic", fontSize: 14, lineHeight: 1.4, color: "var(--fg-1)", flex: 1, textWrap: "pretty" }}>
        &ldquo;{p.quote}&rdquo;
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, borderTop: "1px solid var(--bg-2)", paddingTop: 10 }}>
        <span style={{ fontSize: 10, color: "var(--k-spruce-70)", fontWeight: 600 }}>{loud}</span>
        <span style={{ display: "inline-flex", alignItems: "center", gap: 7 }}>
          <code style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: "var(--fg-subtle)", background: "transparent", padding: 0 }}>{p.id}</code>
          <span className="ch-cta" style={{ fontSize: 10.5, fontWeight: 600, color: "var(--k-spruce-70)", background: "var(--k-ai-spruce-12)", borderRadius: 999, padding: "4px 12px", whiteSpace: "nowrap", transition: "background 0.14s ease, color 0.14s ease" }}>Open ↗</span>
        </span>
      </div>
    </div>
  );
}

function PersonaModal({ index, onClose, onNav }) {
  const [tab, setTab] = useState("profile");
  const p = PERSONAS[index];
  const hasTalk = typeof BIL_TALK !== "undefined" ? !!BIL_TALK[p.id] : true;

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape") onClose();
      else if (e.key === "ArrowRight") onNav(1);
      else if (e.key === "ArrowLeft") onNav(-1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [onClose, onNav]);

  // reset to profile when persona changes
  useEffect(() => { setTab("profile"); }, [index]);

  const tabBtn = (key, label) => (
    <button onClick={() => setTab(key)} style={{
      padding: "6px 16px", borderRadius: 999, border: "none", cursor: "pointer",
      fontFamily: "var(--font-sans)", fontSize: 12, fontWeight: 600,
      background: tab === key ? "#fff" : "transparent",
      color: tab === key ? "var(--k-dark-stone-90)" : "rgba(255,255,255,0.7)",
    }}>{label}</button>
  );
  const navBtn = (label, d) => (
    <button onClick={() => onNav(d)} style={{ padding: "7px 13px", borderRadius: 6, background: "rgba(255,255,255,0.10)", border: "1px solid rgba(255,255,255,0.22)", color: "#fff", fontSize: 12, fontWeight: 500, fontFamily: "var(--font-sans)", cursor: "pointer" }}>{label}</button>
  );

  return (
    <div className="ch-modal-scrim" onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 50, background: "rgba(8,10,12,0.82)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "3.5vh 3vw" }}>
      <div className="ch-modal-card" onClick={(e) => e.stopPropagation()} style={{ width: "min(1280px, 94vw)", height: "min(900px, 92vh)", display: "flex", flexDirection: "column", gap: 12 }}>
        {/* modal chrome */}
        <div style={{ flex: "0 0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
            <span style={{ color: "#fff", fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 19, whiteSpace: "nowrap" }}>{p.name}</span>
            <span style={{ fontSize: 12, color: "rgba(255,255,255,0.6)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.role}</span>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 10.5, color: "rgba(255,255,255,0.45)", whiteSpace: "nowrap" }}>{p.id} · synthetic · {index + 1}/{PERSONAS.length}</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, flex: "0 0 auto" }}>
            <div style={{ display: "flex", background: "rgba(255,255,255,0.10)", borderRadius: 999, padding: 3 }}>
              {tabBtn("profile", "Profile")}
              {hasTalk ? tabBtn("talk", "Talk") : null}
            </div>
            {navBtn("← Prev", -1)}
            {navBtn("Next →", 1)}
            <button onClick={onClose} style={{ padding: "7px 13px", borderRadius: 6, background: "var(--k-warm-red-50)", border: "1px solid var(--k-warm-red-50)", color: "#fff", fontSize: 12, fontWeight: 600, fontFamily: "var(--font-sans)", cursor: "pointer" }}>Close ✕</button>
          </div>
        </div>
        {/* modal content */}
        {tab === "profile" ? (
          <ScaledStage w={FMT_A4L.w} h={FMT_A4L.h} key={"prof" + index}>
            <PersonaCard p={p} idx={index} />
          </ScaledStage>
        ) : (
          <div style={{ flex: 1, minHeight: 0, borderRadius: 10, overflow: 'hidden' }} key={"talk" + index}>
            <ScreenBilTalk personaId={p.id} />
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Target State Screens (inline) ── */
const TS_SCREENS = [
  { wf: "WF-01", title: "Data intake", comp: "PortalIntake", moments: "D1", color: "#29707A",
    desc: "Version-aware before any policy logic runs — the run starts only on a supported schema." },
  { wf: "WF-02", title: "Validation run", comp: "PortalRun", moments: "D2–D4", color: "#8A4FBF",
    desc: "The deterministic Policy-as-Code layer is authoritative; the agent explains and suggests — never decides." },
  { wf: "WF-03", title: "Exception review", comp: "PortalReview", moments: "D5", color: "#E68A00",
    desc: "Human-in-the-loop — no approval without a reason, written to the Trust Record." },
  { wf: "WF-04", title: "Summary & evidence", comp: "PortalEvidence", moments: "D6–D7", color: "#1F5580",
    desc: "The run replays from this pack alone — chain of custody complete by construction." },
];

function ScreenStage({ children }) {
  const ref = useRef(null);
  const [scale, setScale] = useState(0);
  const W = 1440, H = 900;
  useEffect(() => {
    const el = ref.current;
    const fit = () => { const r = el.getBoundingClientRect(); setScale(Math.min((r.width - 8) / W, (r.height - 8) / H)); };
    fit();
    const ro = new ResizeObserver(fit);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  return (
    <div ref={ref} style={{ flex: 1, minHeight: 0, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
      {scale > 0 ? (
        <div style={{ width: W * scale, height: H * scale, flex: "0 0 auto" }}>
          <div style={{ width: W, height: H, transform: `scale(${scale})`, transformOrigin: "top left", borderRadius: 12, overflow: "hidden", boxShadow: "0 24px 64px rgba(15,23,42,0.22)", border: "1px solid var(--border-1)", background: "#fff" }}>
            {children}
          </div>
        </div>
      ) : null}
    </div>
  );
}

function TargetStateView() {
  const [i, setI] = useState(0);
  const s = TS_SCREENS[i];
  const Comp = window[s.comp];
  const go = (n) => setI(Math.max(0, Math.min(TS_SCREENS.length - 1, n)));

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight") setI((v) => Math.min(TS_SCREENS.length - 1, v + 1));
      else if (e.key === "ArrowLeft") setI((v) => Math.max(0, v - 1));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <div style={{ flex: 1, minHeight: 0, display: "flex" }}>
      <aside style={{ flex: "0 0 290px", background: "#fff", borderRight: "1px solid var(--border-1)", padding: "20px 16px", display: "flex", flexDirection: "column", gap: 10, overflow: "auto" }}>
        <div style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--fg-muted)", padding: "0 6px 2px" }}>The to-be journey · 4 screens</div>
        {TS_SCREENS.map((sc, k) => {
          const active = k === i;
          return (
            <React.Fragment key={sc.wf}>
              <div className="ts-rail-item" onClick={() => setI(k)} style={{
                display: "flex", gap: 12, padding: "13px 13px", borderRadius: 10,
                background: active ? "var(--bg-2)" : "transparent",
                border: `1px solid ${active ? sc.color : "var(--border-1)"}`,
                borderLeft: `4px solid ${active ? sc.color : "var(--border-1)"}`,
              }}>
                <span style={{ width: 30, height: 30, borderRadius: 999, flex: "0 0 auto", background: active ? sc.color : "var(--bg-3)", color: active ? "#fff" : "var(--fg-muted)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 14 }}>{k + 1}</span>
                <span style={{ minWidth: 0 }}>
                  <span style={{ display: "flex", alignItems: "center", gap: 7 }}>
                    <span style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 14.5, color: "var(--fg-1)" }}>{sc.title}</span>
                    <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: sc.color, border: `1px solid ${sc.color}`, borderRadius: 999, padding: "1px 6px" }}>{sc.wf}</span>
                  </span>
                  <span style={{ display: "block", fontSize: 11.5, color: "var(--fg-muted)", marginTop: 4, lineHeight: 1.4, textWrap: "pretty" }}>{sc.desc}</span>
                  <span style={{ display: "inline-block", marginTop: 6, fontFamily: "var(--font-mono)", fontSize: 9.5, color: "var(--k-warm-red-50)", background: "rgba(255,70,45,0.06)", border: "1px solid rgba(255,70,45,0.3)", borderRadius: 4, padding: "1px 7px" }}>{sc.moments}</span>
                </span>
              </div>
              {k < TS_SCREENS.length - 1 ? <div style={{ textAlign: "center", color: "var(--fg-subtle)", fontSize: 13, lineHeight: 0.4 }}>↓</div> : null}
            </React.Fragment>
          );
        })}
      </aside>
      <div style={{ flex: 1, minWidth: 0, minHeight: 0, display: "flex", flexDirection: "column", background: "var(--bg-2)" }}>
        <div style={{ flex: "0 0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, padding: "13px 24px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <span style={{ width: 26, height: 26, borderRadius: 999, background: s.color, color: "#fff", display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 13 }}>{i + 1}</span>
            <span style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 17, color: "var(--fg-1)" }}>{s.title}</span>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-muted)" }}>{s.wf} · {s.moments}</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button className="ts-arrow" onClick={() => go(i - 1)} disabled={i === 0} style={{ background: "#fff", color: "var(--fg-1)", border: "1px solid var(--border-1)", boxShadow: "0 2px 8px rgba(15,23,42,0.1)" }}>←</button>
            <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--fg-muted)", minWidth: 44, textAlign: "center" }}>{i + 1} / {TS_SCREENS.length}</span>
            <button className="ts-arrow" onClick={() => go(i + 1)} disabled={i === TS_SCREENS.length - 1} style={{ background: "var(--k-warm-red-50)", color: "#fff", boxShadow: "0 8px 22px rgba(255,70,45,0.35)" }}>→</button>
          </div>
        </div>
        <div style={{ flex: 1, minHeight: 0, padding: "0 24px 22px", display: "flex", flexDirection: "column" }}>
          <ScreenStage key={s.wf}>{Comp ? <Comp /> : null}</ScreenStage>
        </div>
      </div>
    </div>
  );
}

/* ── Cohort View ── */
function CohortView() {
  const [open, setOpen] = useState(null);
  const nav = (d) => setOpen((o) => (o + d + PERSONAS.length) % PERSONAS.length);

  return (
    <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", overflow: "auto" }}>
      <main style={{ flex: 1, padding: "30px 40px 56px" }}>
        <div style={{ maxWidth: 1320, margin: "0 auto" }}>
          <div style={{ fontSize: 14, color: "var(--fg-muted)", marginBottom: 22, maxWidth: "76ch", lineHeight: 1.5, textWrap: "pretty" }}>
            Each persona is an AI stand-in built from the pre-work interviews — not a real person. <strong style={{ color: "var(--fg-1)" }}>Click any card</strong> to open their full profile, then switch to <strong style={{ color: "var(--fg-1)" }}>Talk</strong> to interrogate them with the answers grounded in their transcripts.
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(290px, 1fr))", gap: 18 }}>
            {PERSONAS.map((p, i) => <CohortTile key={p.id} p={p} onOpen={() => setOpen(i)} />)}
          </div>
        </div>
      </main>
      <footer style={{ flex: "0 0 auto", background: "#fff", borderTop: "1px solid var(--border-1)", padding: "14px 40px", textAlign: "center", fontSize: 12, color: "var(--fg-muted)" }}>
        Synthetic cohort · composites, not real interviews · BiL × Kyndryl Vital · Kyndryl Agentic Framework
      </footer>
      {open !== null ? <PersonaModal index={open} onClose={() => setOpen(null)} onNav={nav} /> : null}
    </div>
  );
}

/* ── App Shell with Toggle ── */
function App() {
  const [view, setView] = useState("cohort");

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", fontFamily: "var(--font-sans)", color: "var(--fg-2)" }}>
      {/* shared header with toggle */}
      <header style={{ flex: "0 0 auto", background: "#fff", borderBottom: "1px solid var(--border-1)", padding: "16px 40px" }}>
        <div style={{ maxWidth: 1320, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 18, minWidth: 0 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--k-spruce-70)" }}>
                {view === "cohort" ? "Synthetic cohort · AI composites from real transcripts" : "Envisioned target state · agentic AI process"}
              </div>
              <div style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 28, color: "var(--fg-1)", letterSpacing: "-0.015em", marginTop: 4, lineHeight: 1.1 }}>
                {view === "cohort" ? "The ten voices in the room" : "AnaCredit Validation Portal"}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flex: "0 0 auto" }}>
            <div style={{ display: "flex", background: "var(--bg-2)", borderRadius: 999, padding: 3, gap: 2 }}>
              <button className={"view-toggle" + (view === "cohort" ? " active" : "")} onClick={() => setView("cohort")}>Personas</button>
              <button className={"view-toggle" + (view === "target" ? " active" : "")} onClick={() => setView("target")}>Target State</button>
            </div>
            <img src="assets/kyndryl-vital-logo.png" alt="Kyndryl Vital" style={{ height: 26, flex: "0 0 auto", marginLeft: 14 }} />
          </div>
        </div>
      </header>

      {/* view content */}
      {view === "cohort" ? <CohortView /> : <TargetStateView />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
